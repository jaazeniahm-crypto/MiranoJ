<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Da Go</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#ff5722;
    color:white;
    padding:20px;
    text-align:center;
}

.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 10px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.card h2{
    margin:10px 0;
}

.card p{
    color:#ff5722;
    font-size:20px;
    font-weight:bold;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    background:#ff5722;
    color:white;
    cursor:pointer;
    border-radius:5px;
    transition:.3s;
}

button:hover{
    background:#e64a19;
}

.cart{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,.15);
}

#cartItems{
    list-style:none;
}

#cartItems li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
    padding:10px;
    background:#f2f2f2;
    border-radius:6px;
}

.remove-btn{
    background:crimson;
    color:white;
    border:none;
    padding:6px 12px;
    cursor:pointer;
    border-radius:5px;
}

.remove-btn:hover{
    background:darkred;
}

#checkout{
    width:100%;
    font-size:18px;
    padding:15px;
    margin-top:20px;
    background:#4CAF50;
}

#checkout:hover{
    background:#388E3C;
}
</style>

</head>
<body>

<header>
    <h1>🚙 Food Da Go</h1>
    <p>Fresh Food Delivered Fast!</p>
</header>

<section class="menu">

    <div class="card">
        <img src="burger.jpg" alt="Burger">
        <h2>Burger</h2>
        <p>₱100</p>
        <button onclick="addToCart('Burger',100)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="pizza.jpg" alt="Pizza">
        <h2>Pizza</h2>
        <p>₱200</p>
        <button onclick="addToCart('Pizza',200)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="fried chicken.jpg" alt="Fried Chicken">
        <h2>Fried Chicken</h2>
        <p>₱150</p>
        <button onclick="addToCart('Fried Chicken',150)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="french fries.jpg" alt="French Fries">
        <h2>French Fries</h2>
        <p>₱50</p>
        <button onclick="addToCart('French Fries',50)">Add to Cart</button>
    </div>

</section>

<section class="cart">

    <h2>🛒 Shopping Cart</h2>

    <ul id="cartItems"></ul>

    <h3>Total: ₱<span id="total">0</span></h3>

    <button id="checkout">Checkout</button>

</section>

<script>
let cart = [];

// Add item
function addToCart(name, price){
    cart.push({
        name:name,
        price:price
    });

    displayCart();
}

// Remove item
function removeItem(index){
    cart.splice(index,1);
    displayCart();
}

// Display cart
function displayCart(){

    const cartItems=document.getElementById("cartItems");
    const totalDisplay=document.getElementById("total");

    cartItems.innerHTML="";

    let total=0;

    cart.forEach((item,index)=>{

        total+=item.price;

        let li=document.createElement("li");

        li.innerHTML=`
            <span>${item.name} - ₱${item.price}</span>
            <button class="remove-btn" onclick="removeItem(${index})">
                Remove
            </button>
        `;

        cartItems.appendChild(li);
    });

    totalDisplay.textContent=total;
}

// Checkout
document.getElementById("checkout").addEventListener("click",()=>{

    if(cart.length===0){
        alert("Your cart is empty!");
        return;
    }

    let total=cart.reduce((sum,item)=>sum+item.price,0);

    alert("Order placed successfully!\n\nTotal: ₱"+total);

    cart=[];
    displayCart();

});
</script>

</body>
</html>
